<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SkyWay 画面共有</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        video { max-width: 800px; width: 100%; border: 1px solid #ddd; }
        .controls { margin-bottom: 20px; }
        .controls input, .controls button { padding: 8px; margin-right: 5px; }
        .room-controls { margin-bottom: 20px; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>SkyWay 画面共有</h1>

    <div class="room-controls">
        <h3>1. ルーム設定</h3>
        <input type="text" id="roomNameInput" placeholder="ルーム名を入力" value="my-room">
        <button id="joinRoomBtn">ホストとして参加 (画面共有)</button>
        <button id="viewRoomBtn">視聴者として参加</button>
    </div>

    <div class="controls">
        <h3>2. 共有画面</h3>
        <video id="localVideo" autoplay muted playsinline></video>
    </div>

    <div id="errorMessage" class="error"></div>

    <!-- ① importmap で SkyWay SDK の ESM 版を指定 -->
    <script type="importmap">
        {
            "imports": {
                "@skyway-sdk/room": "https://cdn.jsdelivr.net/npm/@skyway-sdk/room@1.0.0/dist/esm/index.js"
            }
        }
    </script>

    <!-- ② main.js を module として読み込む -->
    <script type="module" src="main.js"></script>
</body>
</html>
